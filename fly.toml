# fly.toml app configuration file generated for whatsapp-bridge-api on 2026-04-29T14:57:51Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = "whatsapp-bridge-api"
primary_region = "gru"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[mounts]]
  source = "whatsapp_data"
  destination = "/data"

[vm]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024
