name: Deploy to Fly.io
on:
  push:
    branches:
      - main
env:
  FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
jobs:
  deploy:
    name: Deploy app
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: superfly/flyctl-actions/setup-flyctl@master
      
      - name: Garantir que os Volumes existem nos EUA
        # Vamos criar dois volumes em 'iad' como ele pediu
        run: |
          flyctl volumes create whatsapp_data --region iad --size 1 -a whatsapp-bridge-api --non-interactive || true
          flyctl volumes create whatsapp_data --region iad --size 1 -a whatsapp-bridge-api --non-interactive || true
        
      - name: Deploy
        # Tiramos o --ha=false para deixar ele criar as duas máquinas
        run: flyctl deploy --remote-only -a whatsapp-bridge-api


