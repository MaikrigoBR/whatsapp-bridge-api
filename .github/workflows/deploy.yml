name: Deploy to Fly.io
on:
  push:
    branches:
      - main
env:
  FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
jobs:
  deploy:
    name: Deploy app
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: superfly/flyctl-actions/setup-flyctl@master
      
      - name: Garantir que o Volume existe
        # Aqui dizemos ao GitHub para entrar na pasta do robô antes de rodar o comando
        working-directory: ./whatsapp-api/whatsapp-bridge-api-main
        run: flyctl volumes create whatsapp_data --region gru --size 1 -a whatsapp-bridge-api --non-interactive || true
        
      - name: Deploy
        # Aqui também avisamos que o robô está na subpasta
        working-directory: ./whatsapp-api/whatsapp-bridge-api-main
        run: flyctl deploy --remote-only -a whatsapp-bridge-api
