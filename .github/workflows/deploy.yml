name: Deploy to Fly.io
on:
  push:
    branches:
      - main
env:
  FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
jobs:
  deploy:
    name: Deploy app
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: superfly/flyctl-actions/setup-flyctl@master
      
      - name: Garantir que o Volume existe
        # Agora ele tenta criar em SP e ignora se já existir
        run: flyctl volumes create whatsapp_data --region gru --size 1 -a whatsapp-bridge-api --non-interactive || true
        
      - name: Deploy
        # Adicionei o "--ha=false" para ele não tentar criar 2 robôs
        run: flyctl deploy --remote-only --ha=false -a whatsapp-bridge-api

