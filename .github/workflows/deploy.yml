name: Deploy to Fly.io
on:
  push:
    branches:
      - main
env:
  FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
jobs:
  deploy:
    name: Deploy app
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: superfly/flyctl-actions/setup-flyctl@master
      
      - name: Garantir que o Volume existe
        # Removi o "working-directory", agora ele procura na frente de tudo
        run: flyctl volumes create whatsapp_data --region gru --size 1 -a whatsapp-bridge-api --non-interactive || true
        
      - name: Deploy
        # Removi o "working-directory" aqui também
        run: flyctl deploy --remote-only -a whatsapp-bridge-api

